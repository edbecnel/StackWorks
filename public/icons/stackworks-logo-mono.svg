<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="StackWorks mono logo">
  <defs>
    <filter id="softShadow" x="-25%" y="-25%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>

    <!-- pawn mask for internal groove lines -->
    <mask id="pawnMask">
      <rect width="320" height="320" fill="black"/>
      <g fill="white">
        <circle cx="160" cy="92" r="40"/>
        <ellipse cx="160" cy="150" rx="62" ry="22"/>
        <rect x="98" y="162" width="124" height="28" rx="14" ry="14"/>
        <rect x="88" y="190" width="144" height="30" rx="15" ry="15"/>
        <rect x="74" y="220" width="172" height="42" rx="21" ry="21"/>
        <rect x="64" y="258" width="192" height="18" rx="9" ry="9"/>
      </g>
    </mask>


    <g id="stackPawnMono">
      <g>
        <circle cx="160" cy="92" r="40" fill="#FFF7DA" stroke="#1A1C22" stroke-width="10"/>
        <ellipse cx="160" cy="150" rx="62" ry="22" fill="#FFF7DA" stroke="#1A1C22" stroke-width="10"/>

        <rect x="98" y="162" width="124" height="28" rx="14" ry="14" fill="#FFF7DA" stroke="#1A1C22" stroke-width="10"/>
        <rect x="88" y="190" width="144" height="30" rx="15" ry="15" fill="#FFF7DA" stroke="#1A1C22" stroke-width="10"/>
        <rect x="74" y="220" width="172" height="42" rx="21" ry="21" fill="#FFF7DA" stroke="#1A1C22" stroke-width="10"/>
        <rect x="64" y="258" width="192" height="18" rx="9" ry="9" fill="#FFF7DA" stroke="#1A1C22" stroke-width="10"/>
      </g>

      <g mask="url(#pawnMask)" opacity="0.75">
        <path d="M 80 206 H 240" stroke="#1A1C22" stroke-width="8" stroke-linecap="round"/>
        <path d="M 72 238 H 248" stroke="#1A1C22" stroke-width="8" stroke-linecap="round"/>
      </g>
    </g>
</defs>
  <g transform="translate(36,40)" filter="url(#softShadow)">
    <ellipse cx="110" cy="276" rx="108" ry="18" fill="#1A1C22" opacity="0.12"/>
    <g transform="translate(-50,-20)"><use href="#stackPawnMono"/></g>
  </g>
  <g transform="translate(250,78)" filter="url(#softShadow)">
    <rect x="0" y="22" width="900" height="124" rx="34" fill="#F0E1B7" stroke="#1A1C22" stroke-width="6"/>
    <text x="34" y="114" font-family="Verdana, Trebuchet MS, Arial, sans-serif" font-weight="900" letter-spacing="1.0"
          fill="#1A1C22" font-size="96">StackWorks</text>
    <text x="678" y="116" font-family="Verdana, Trebuchet MS, Arial, sans-serif" font-weight="900" letter-spacing="0.2"
          font-size="38" fill="#1A1C22">.games</text>
  </g>
</svg>