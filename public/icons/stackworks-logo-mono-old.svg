<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="StackWorks mono logo">
  <defs>
    <filter id="softShadow" x="-25%" y="-25%" width="160%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <g id="disc">
      <path d="M -78,0 L -78,44 A 78,22 0 0 0 78,44 L 78,0"
            fill="#E8D39B" stroke="#1A1C22" stroke-width="8" stroke-linejoin="round"/>
      <ellipse cx="0" cy="0" rx="78" ry="22" fill="#FFF7DA" stroke="#1A1C22" stroke-width="8"/>
      <path d="M -78,44 A 78,22 0 0 0 78,44" fill="none" stroke="#1A1C22" stroke-width="8" stroke-linecap="round"/>
    </g>
  </defs>
  <g transform="translate(36,40)" filter="url(#softShadow)">
    <g transform="translate(102,152)"><use href="#disc"/></g>
    <g transform="translate(86,88)"><use href="#disc"/></g>
    <g transform="translate(110,24)">
