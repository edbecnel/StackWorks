      <g transform="translate(0,-2) scale(0.88)">
        <path d="M -22 10 L -22 -3 L -12 2 L 0 -11 L 12 2 L 22 -3 L 22 10 Z" fill="#1A1C22"/>
        <circle cx="-22" cy="10" r="3" fill="#1A1C22"/>
        <circle cx="0" cy="-11" r="3" fill="#1A1C22"/>
        <circle cx="22" cy="10" r="3" fill="#1A1C22"/>
      </g>
    </g>
  </g>
  <g transform="translate(250,78)" filter="url(#softShadow)">
    <rect x="0" y="22" width="900" height="124" rx="34" fill="#F0E1B7" stroke="#1A1C22" stroke-width="6"/>
    <text x="34" y="114" font-family="Verdana, Trebuchet MS, Arial, sans-serif" font-weight="900" letter-spacing="1.0"
          fill="#1A1C22" font-size="96">StackWorks</text>
    <text x="678" y="116" font-family="Verdana, Trebuchet MS, Arial, sans-serif" font-weight="900" letter-spacing="0.2"
          font-size="38" fill="#1A1C22">.games</text>
